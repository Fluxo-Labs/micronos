[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "Zlib",
]

[advisories]
version = 2
ignore = []

[bans]
version = 2
workspace-default-features = true
allow = []

[sources]
version = 2
replace-with = "vendored-sources"

[vendored-sources]
remote-git-registry = { name = "git" }
