name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: {}
        
      - name: Package
        run: |
          cargo package --manifest-path crates/micronos-core/Cargo.toml
          cargo package --manifest-path crates/micronos-kernel/Cargo.toml
          cargo package --manifest-path crates/micronos-net/Cargo.toml
          cargo package --manifest-path crates/micronos-fs/Cargo.toml
          cargo package --manifest-path crates/micronos-services/Cargo.toml
          cargo package --manifest-path crates/micronos-drivers/Cargo.toml
          cargo package --manifest-path micronos-bin/Cargo.toml
          
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path crates/micronos-core/Cargo.toml
          cargo publish --manifest-path crates/micronos-kernel/Cargo.toml
          cargo publish --manifest-path crates/micronos-net/Cargo.toml
          cargo publish --manifest-path crates/micronos-fs/Cargo.toml
          cargo publish --manifest-path crates/micronos-services/Cargo.toml
          cargo publish --manifest-path crates/micronos-drivers/Cargo.toml
          cargo publish --manifest-path micronos-bin/Cargo.toml

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: MicronOS v${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
