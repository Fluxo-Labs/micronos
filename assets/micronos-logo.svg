<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="MicronOS logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EE7FF"/>
      <stop offset="0.5" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="300" fill="#0B1020"/>

  <!-- Emblem -->
  <g transform="translate(110 60)" filter="url(#shadow)">
    <circle cx="90" cy="90" r="86" fill="none" stroke="url(#g)" stroke-width="10"/>
    <path d="M90 18 L108 64 L158 72 L122 106 L132 156 L90 132 L48 156 L58 106 L22 72 L72 64 Z" fill="url(#g)" opacity="0.95"/>
    <circle cx="90" cy="90" r="18" fill="#0B1020" stroke="url(#g)" stroke-width="6"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(320 95)">
    <text x="0" y="85" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="96" font-weight="800" fill="#EAF0FF">MicronOS</text>
    <text x="4" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="22" fill="#A9B4D0">A Rust micronation OS — by Rust programmers, for Rust programmers</text>
    <rect x="4" y="150" width="520" height="6" rx="3" fill="url(#g)" opacity="0.9"/>
  </g>
</svg>
